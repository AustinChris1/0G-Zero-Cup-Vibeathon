<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="0G Receipts">
  <rect width="512" height="512" rx="116" fill="#0b0c0e"/>
  <rect x="0.5" y="0.5" width="511" height="511" rx="115.5" stroke="#23272d"/>

  <!-- receipt -->
  <rect x="150" y="104" width="168" height="250" rx="16" fill="#ceff1a"/>
  <!-- perforated bottom (notches in the background colour) -->
  <g fill="#0b0c0e">
    <circle cx="164" cy="354" r="13"/>
    <circle cx="190" cy="354" r="13"/>
    <circle cx="216" cy="354" r="13"/>
    <circle cx="242" cy="354" r="13"/>
    <circle cx="268" cy="354" r="13"/>
    <circle cx="294" cy="354" r="13"/>
    <circle cx="318" cy="354" r="13"/>
  </g>
  <!-- printed content -->
  <g fill="#0b0c0e">
    <rect x="176" y="132" width="74" height="16" rx="5"/>
    <rect x="176" y="166" width="100" height="9" rx="4.5"/>
    <rect x="176" y="185" width="80" height="9" rx="4.5"/>
    <!-- barcode -->
    <rect x="176" y="298" width="6" height="36"/>
    <rect x="188" y="298" width="3" height="36"/>
    <rect x="197" y="298" width="8" height="36"/>
    <rect x="211" y="298" width="4" height="36"/>
    <rect x="221" y="298" width="6" height="36"/>
    <rect x="233" y="298" width="3" height="36"/>
    <rect x="241" y="298" width="7" height="36"/>
  </g>

  <!-- sealed stamp, slammed on the corner -->
  <g transform="rotate(-12 338 322)">
    <circle cx="338" cy="322" r="58" fill="#0b0c0e"/>
    <circle cx="338" cy="322" r="58" fill="none" stroke="#ff4326" stroke-width="11"/>
    <circle cx="338" cy="322" r="46" fill="none" stroke="#ff4326" stroke-width="3.5"/>
    <path d="M314 322 l16 18 l34 -40" fill="none" stroke="#ff4326" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
